<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>zukaku api</title>
  <style>
    /* 画面に余計な装飾を出さず JSON を見やすく */
    body { margin: 0; padding: 12px; font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, "Liberation Mono", monospace; }
    pre { white-space: pre-wrap; word-break: break-word; margin: 0; }
  </style>
</head>
<body>
<pre id="out"></pre>

<script type="module">
  import { getZukakuNW } from './zukaku.js';

  const params = new URLSearchParams(location.search);

  // 必須引数 w
  const w = params.get('w') ?? '';

  // use_legacy_lv1250 は "1","true","yes","on" を true 扱い
  const legacyRaw = (params.get('use_legacy_lv1250') ?? '').toLowerCase();
  const useLegacyLv1250 = ['1', 'true', 'yes', 'on'].includes(legacyRaw);

  let result;
  if (!w) {
    // 入力不足時はエラーJSON
    result = {
      error: "missing parameter",
      usage: {
        example1: `${location.origin}${location.pathname}?w=08ne2332`,
        example2: `${location.origin}${location.pathname}?w=08ne2332&use_legacy_lv1250=1`
      }
    };
  } else {
    result = getZukakuNW(w, useLegacyLv1250);
  }

  // 画面には JSON のみを表示（pretty）
  const jsonText = JSON.stringify(result, null, 2);
  const out = document.getElementById('out');
  out.textContent = jsonText;

  // “APIっぽく”したいのでタイトルもJSONに合わせる（任意）
  document.title = (result.error ? 'error' : 'ok');

  // Content-Type を変えられない代替として、JSONをダウンロードしたい場合（任意）
  // const blob = new Blob([jsonText], { type: 'application/json' });
  // const url = URL.createObjectURL(blob);
  // location.replace(url);
</script>
</body>
</html>
